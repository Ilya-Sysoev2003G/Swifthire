<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание услуги - SwiftHire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/tailwind.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#574082',
                        bgGray: '#d9d9d9'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bgGray min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center text-white font-bold text-xl">
                        SH
                    </div>
                    <span class="text-2xl font-bold text-primary">SwiftHire</span>
                </div>
                <!-- Desktop Navigation -->
                <div class="hidden md:flex space-x-6 nav-desktop">
                    <a href="/pages/index.html" class="nav-link">Главная</a>
                    <a href="/pages/search-service.html" class="nav-link">Поиск услуг</a>
                    <a href="/pages/search-orders.html" class="nav-link">Поиск заказов</a>
                    <a href="/pages/dashboard.html" id="dashboardLink" class="nav-link">Кабинет</a>
                    <a href="/pages/profile.html" id="profileLink" class="nav-link">Профиль</a>
                    <a href="/pages/chat.html" id="chatLink" class="nav-link">Чат</a>
                </div>
                
                <!-- Desktop Buttons -->
                <div class="hidden md:flex space-x-4">
                    <button id="loginBtn" class="btn-primary">Войти</button>
                </div>
                
                <!-- Mobile Menu Button -->
                <button id="mobileMenuBtn" class="md:hidden p-2">
                    <div class="hamburger">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </button>
            </div>
        </nav>
    </header>

    <!-- Mobile Menu -->
    <div id="mobileMenu" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 md:hidden">
        <div class="fixed right-0 top-0 bottom-0 w-64 bg-white shadow-xl mobile-menu-enter">
            <div class="p-4">
                <button id="closeMobileMenu" class="float-right text-gray-600 text-3xl">&times;</button>
                <div class="clear-both pt-8 space-y-4">
                    <a href="/pages/index.html" class="block py-3 px-4 text-gray-700 hover:bg-gray-100 rounded">
                        Главная
                    </a>
                    <a href="/pages/search-service.html" class="block py-3 px-4 text-gray-700 hover:bg-gray-100 rounded">
                        Поиск услуг
                    </a>
                    <a href="/pages/search-orders.html" class="block py-3 px-4 text-gray-700 hover:bg-gray-100 rounded">
                        Поиск заказов
                    </a>
                    <a href="/pages/dashboard.html" id="dashboardLinkMobile" class="block py-3 px-4 text-gray-700 hover:bg-gray-100 rounded">
                        Кабинет
                    </a>
                    <a href="/pages/profile.html" id="profileLinkMobile" class="block py-3 px-4 text-gray-700 hover:bg-gray-100 rounded">
                        Профиль
                    </a>
                    <a href="/pages/chat.html" id="chatLinkMobile" class="block py-3 px-4 text-gray-700 hover:bg-gray-100 rounded">
                        Чат
                    </a>
                    <div class="border-t pt-4 mt-4 space-y-2">
                        <button id="loginBtnMobile" class="btn-primary w-full">Войти</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <div class="max-w-3xl mx-auto">
            <h1 id="pageTitle" class="text-4xl font-bold text-primary mb-8">Создание услуги</h1>

            <form id="serviceForm" class="card">
                <div class="space-y-6">
                    <!-- Название услуги -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Название услуги *
                        </label>
                        <input 
                            type="text" 
                            id="title" 
                            name="title"
                            placeholder="Например: Разработка логотипа"
                            required
                            class="w-full"
                        >
                    </div>

                    <!-- Категория -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Категория *
                        </label>
                        <select id="category" name="category" required class="w-full">
                            <option value="">Выберите категорию</option>
                            <option value="design">Дизайн</option>
                            <option value="development">Разработка</option>
                            <option value="marketing">Маркетинг</option>
                            <option value="writing">Копирайтинг</option>
                            <option value="other">Другое</option>
                        </select>
                    </div>

                    <!-- Цена -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Цена (₽) *
                        </label>
                        <input 
                            type="number" 
                            id="price" 
                            name="price"
                            placeholder="5000"
                            min="0"
                            step="1"
                            required
                            class="w-full"
                        >
                    </div>

                    <!-- Описание -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Описание услуги *
                        </label>
                        <textarea 
                            id="description" 
                            name="description"
                            rows="6"
                            placeholder="Подробно опишите, что входит в услугу..."
                            required
                            class="w-full"
                        ></textarea>
                    </div>

                    <!-- Изображение услуги -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Изображение услуги
                        </label>
                        <input 
                            type="file" 
                            id="serviceImage" 
                            name="image"
                            accept=".png,.jpg,.jpeg,.webp"
                            class="w-full"
                        >
                        <p class="text-sm text-gray-500 mt-1">
                            Разрешённые форматы: .png, .jpg, .jpeg, .webp. Максимальный размер: 2 МБ.
                        </p>
                        
                        <!-- Предпросмотр изображения -->
                        <div id="imagePreviewContainer" class="mt-4 hidden">
                            <p class="text-sm font-medium text-gray-700 mb-2">Предпросмотр:</p>
                            <div class="relative inline-block">
                                <img id="imagePreview" src="" alt="Предпросмотр" class="max-w-xs rounded-lg border-2 border-gray-300">
                                <button type="button" id="removeImageBtn" class="absolute top-2 right-2 bg-red-500 text-white rounded-full w-8 h-8 flex items-center justify-center hover:bg-red-600 transition">
                                    ×
                                </button>
                            </div>
                        </div>

                        <!-- Текущее изображение (для режима редактирования) -->
                        <div id="currentImageContainer" class="mt-4 hidden">
                            <p class="text-sm font-medium text-gray-700 mb-2">Текущее изображение:</p>
                            <img id="currentImage" src="" alt="Текущее изображение" class="max-w-xs rounded-lg border-2 border-gray-300">
                        </div>
                    </div>

                    <!-- Кнопки -->
                    <div class="flex space-x-4 pt-4">
                        <button type="submit" id="submitBtn" class="btn-primary flex-1">
                            Опубликовать услугу
                        </button>
                        <a href="/pages/dashboard.html" class="text-primary border-2 border-primary px-6 py-3 rounded-lg hover:bg-primary hover:text-white transition text-center">
                            Отмена
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white mt-16 py-8 border-t">
        <div class="container mx-auto px-4 text-center text-gray-600 text-sm">
            © 2025 SwiftHire. Учебный проект.
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script src="/js/service.js"></script>
    <script src="/js/mobile-menu.js"></script>
</body>
</html>
