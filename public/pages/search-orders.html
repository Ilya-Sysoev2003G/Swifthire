<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск заказов - SwiftHire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/tailwind.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#574082',
                        bgGray: '#d9d9d9'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bgGray min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center text-white font-bold text-xl">
                        SH
                    </div>
                    <span class="text-2xl font-bold text-primary">SwiftHire</span>
                </div>
                <!-- Desktop Navigation -->
                <div class="hidden md:flex space-x-6 nav-desktop">
                    <a href="/pages/index.html" class="nav-link">Главная</a>
                    <a href="/pages/search-service.html" class="nav-link">Поиск услуг</a>
                    <a href="/pages/search-orders.html" class="nav-link active">Поиск заказов</a>
                    <a href="/pages/dashboard.html" id="dashboardLink" class="nav-link">Кабинет</a>
                    <a href="/pages/profile.html" id="profileLink" class="nav-link">Профиль</a>
                    <a href="/pages/chat.html" id="chatLink" class="nav-link">Чат</a>
                </div>
                
                <!-- Desktop Buttons -->
                <div class="hidden md:flex space-x-4">
                    <button id="loginBtn" class="btn-primary">Войти</button>
                </div>
                
                <!-- Mobile Menu Button -->
                <button id="mobileMenuBtn" class="md:hidden p-2">
                    <div class="hamburger">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </button>
            </div>
        </nav>
    </header>

    <!-- Mobile Menu -->
    <div id="mobileMenu" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 md:hidden">
        <div class="fixed right-0 top-0 bottom-0 w-64 bg-white shadow-xl mobile-menu-enter">
            <div class="p-4">
                <button id="closeMobileMenu" class="float-right text-gray-600 text-3xl">&times;</button>
                <div class="clear-both pt-8 space-y-4">
                    <a href="/pages/index.html" class="block py-3 px-4 text-gray-700 hover:bg-gray-100 rounded">
                        Главная
                    </a>
                    <a href="/pages/search-service.html" class="block py-3 px-4 text-gray-700 hover:bg-gray-100 rounded">
                        Поиск услуг
                    </a>
                    <a href="/pages/search-orders.html" class="block py-3 px-4 text-primary font-medium hover:bg-gray-100 rounded">
                        Поиск заказов
                    </a>
                    <a href="/pages/dashboard.html" id="dashboardLinkMobile" class="block py-3 px-4 text-gray-700 hover:bg-gray-100 rounded">
                        Кабинет
                    </a>
                    <a href="/pages/profile.html" id="profileLinkMobile" class="block py-3 px-4 text-gray-700 hover:bg-gray-100 rounded">
                        Профиль
                    </a>
                    <a href="/pages/chat.html" id="chatLinkMobile" class="block py-3 px-4 text-gray-700 hover:bg-gray-100 rounded">
                        Чат
                    </a>
                    <div class="border-t pt-4 mt-4 space-y-2">
                        <button id="loginBtnMobile" class="btn-primary w-full">Войти</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <h1 class="text-4xl font-bold text-primary mb-8">Поиск заказов</h1>

        <!-- Поисковая панель -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <div class="grid md:grid-cols-4 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Поиск</label>
                    <input type="text" id="searchQuery" placeholder="Что вы ищете?" class="w-full">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Категория</label>
                    <select id="categoryFilter" class="w-full">
                        <option value="">Все категории</option>
                        <option value="design">Дизайн</option>
                        <option value="development">Разработка</option>
                        <option value="marketing">Маркетинг</option>
                        <option value="writing">Копирайтинг</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button id="searchBtn" class="btn-primary w-full">Найти</button>
                </div>
            </div>
            <div class="grid md:grid-cols-2 gap-4 mt-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Мин. бюджет</label>
                    <input type="number" id="minBudget" placeholder="От" class="w-full">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Макс. бюджет</label>
                    <input type="number" id="maxBudget" placeholder="До" class="w-full">
                </div>
            </div>
        </div>

        <!-- Результаты поиска -->
        <div id="ordersResults" class="space-y-4">
            <!-- Карточки заказов будут добавлены через JavaScript -->
        </div>

        <!-- Заглушка для пустых результатов -->
        <div id="noResults" class="hidden text-center py-16">
            <div class="text-6xl mb-4">🔍</div>
            <h3 class="text-2xl font-bold text-gray-600 mb-2">Заказы не найдены</h3>
            <p class="text-gray-500">Попробуйте изменить параметры поиска</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white mt-16 py-8 border-t">
        <div class="container mx-auto px-4 text-center text-gray-600 text-sm">
            © 2025 SwiftHire. Учебный проект.
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script src="/js/order.js"></script>
    <script src="/js/mobile-menu.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
