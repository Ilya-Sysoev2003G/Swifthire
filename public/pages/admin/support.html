<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панель - Управление заявками</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-primary {
            background-color: #574082;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background-color: #45346b;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-lg p-6">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-purple-800">👑 Админ панель</h1>
                <a href="/pages/profile.html" class="text-gray-600 hover:text-gray-800">← Назад в профиль</a>
            </div>
            
            <div class="border-t pt-6">
                <h2 class="text-xl font-bold mb-4">🎫 Заявки в техподдержку</h2>
                
                <div id="ticketsList" class="space-y-4">
                    <div class="text-center text-gray-500 py-8">
                        Загрузка заявок...
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Простая загрузка заявок
        async function loadTickets() {
            try {
                const response = await fetch('/api/support/admin/tickets', {
                    credentials: 'include'
                });
                
                if (response.status === 403) {
                    document.getElementById('ticketsList').innerHTML = `
                        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
                            ⚠️ Доступ запрещен. Только для администраторов.
                        </div>
                    `;
                    return;
                }
                
                const data = await response.json();
                
                if (data.success && data.tickets.length > 0) {
                    document.getElementById('ticketsList').innerHTML = data.tickets.map(ticket => `
                        <div class="border rounded-lg p-4 hover:shadow-md transition">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="font-bold text-lg">#${ticket.id} ${escapeHtml(ticket.subject)}</h3>
                                    <p class="text-sm text-gray-600">От: ${escapeHtml(ticket.user_name)} (${escapeHtml(ticket.user_email)})</p>
                                    <p class="text-sm text-gray-500 mt-2">${new Date(ticket.created_at).toLocaleString('ru-RU')}</p>
                                    <p class="mt-2">${escapeHtml(ticket.description)}</p>
                                </div>
                                <div>
                                    <span class="inline-block px-3 py-1 rounded-full text-sm ${getStatusClass(ticket.status)}">
                                        ${getStatusText(ticket.status)}
                                    </span>
                                </div>
                            </div>
                            ${ticket.admin_response ? `
                                <div class="mt-3 p-3 bg-blue-50 rounded">
                                    <strong>Ответ:</strong> ${escapeHtml(ticket.admin_response)}
                                </div>
                            ` : `
                                <div class="mt-3">
                                    <textarea id="response-${ticket.id}" rows="2" class="w-full p-2 border rounded" placeholder="Введите ответ..."></textarea>
                                    <button onclick="respondToTicket(${ticket.id})" class="mt-2 bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700">
                                        Ответить
                                    </button>
                                </div>
                            `}
                        </div>
                    `).join('');
                } else {
                    document.getElementById('ticketsList').innerHTML = `
                        <div class="text-center text-gray-500 py-8">
                            Нет заявок в поддержку
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading tickets:', error);
                document.getElementById('ticketsList').innerHTML = `
                    <div class="text-center text-red-500 py-8">
                        Ошибка при загрузке заявок
                    </div>
                `;
            }
        }
        
        async function respondToTicket(ticketId) {
            const response = document.getElementById(`response-${ticketId}`).value;
            if (!response) {
                alert('Введите текст ответа');
                return;
            }
            
            try {
                const res = await fetch(`/api/support/admin/tickets/${ticketId}/respond`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ response })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    alert('Ответ отправлен!');
                    loadTickets(); // Обновляем список
                } else {
                    alert(data.error || 'Ошибка при отправке ответа');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Ошибка при отправке ответа');
            }
        }
        
        function getStatusClass(status) {
            const classes = {
                'pending': 'bg-yellow-100 text-yellow-800',
                'in_progress': 'bg-blue-100 text-blue-800',
                'resolved': 'bg-green-100 text-green-800'
            };
            return classes[status] || 'bg-gray-100 text-gray-800';
        }
        
        function getStatusText(status) {
            const texts = {
                'pending': 'Ожидает',
                'in_progress': 'В работе',
                'resolved': 'Решена'
            };
            return texts[status] || status;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Загружаем заявки при загрузке страницы
        document.addEventListener('DOMContentLoaded', () => {
            loadTickets();
        });
    </script>
</body>
</html>
