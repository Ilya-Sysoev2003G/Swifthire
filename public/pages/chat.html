<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат - SwiftHire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/tailwind.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#574082',
                        bgGray: '#d9d9d9'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bgGray min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center text-white font-bold text-xl">
                        SH
                    </div>
                    <span class="text-2xl font-bold text-primary">SwiftHire</span>
                </div>
                <!-- Desktop Navigation -->
                <div class="hidden md:flex space-x-6 nav-desktop">
                    <a href="/pages/index.html" class="nav-link">Главная</a>
                    <a href="/pages/search-service.html" class="nav-link">Поиск услуг</a>
                    <a href="/pages/search-orders.html" class="nav-link">Поиск заказов</a>
                    <a href="/pages/dashboard.html" id="dashboardLink" class="nav-link">Кабинет</a>
                    <a href="/pages/profile.html" id="profileLink" class="nav-link">Профиль</a>
                    <a href="/pages/chat.html" id="chatLink" class="nav-link active">Чат</a>
                    <a href="/pages/support.html" id="supportLink" class="nav-link">Поддержка</a>
                </div>
                
                <!-- Desktop Buttons -->
                <div class="hidden md:flex space-x-4">
                    <button id="loginBtn" class="btn-primary">Войти</button>
                </div>
                
                <!-- Mobile Menu Button -->
                <button id="mobileMenuBtn" class="md:hidden p-2">
                    <div class="hamburger">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </button>
            </div>
        </nav>
    </header>

    <!-- Mobile Menu -->
    <div id="mobileMenu" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 md:hidden">
        <div class="fixed right-0 top-0 bottom-0 w-64 bg-white shadow-xl mobile-menu-enter">
            <div class="p-4">
                <button id="closeMobileMenu" class="float-right text-gray-600 text-3xl">&times;</button>
                <div class="clear-both pt-8 space-y-4">
                    <a href="/pages/index.html" class="block py-3 px-4 text-gray-700 hover:bg-gray-100 rounded">
                        Главная
                    </a>
                    <a href="/pages/search-service.html" class="block py-3 px-4 text-gray-700 hover:bg-gray-100 rounded">
                        Поиск услуг
                    </a>
                    <a href="/pages/search-orders.html" class="block py-3 px-4 text-gray-700 hover:bg-gray-100 rounded">
                        Поиск заказов
                    </a>
                    <a href="/pages/dashboard.html" id="dashboardLinkMobile" class="block py-3 px-4 text-gray-700 hover:bg-gray-100 rounded">
                        Кабинет
                    </a>
                    <a href="/pages/profile.html" id="profileLinkMobile" class="block py-3 px-4 text-gray-700 hover:bg-gray-100 rounded">
                        Профиль
                    </a>
                    <a href="/pages/chat.html" id="chatLinkMobile" class="block py-3 px-4 text-primary font-medium hover:bg-gray-100 rounded">
                        Чат
                    </a>
                    <div class="border-t pt-4 mt-4 space-y-2">
                        <button id="loginBtnMobile" class="btn-primary w-full">Войти</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <h1 class="text-4xl font-bold text-primary mb-8">Сообщения</h1>

        <div class="grid md:grid-cols-3 gap-6">
            <!-- Список чатов -->
            <div class="card md:col-span-1">
                <h3 class="text-xl font-bold text-primary mb-4">Контакты</h3>
                <div id="chatList" class="space-y-2">
                    <!-- Список контактов будет добавлен через JavaScript -->
                    <div class="text-center py-8 text-gray-500">
                        <div class="text-4xl mb-2">💬</div>
                        <p>Нет активных чатов</p>
                    </div>
                </div>
            </div>

            <!-- Окно чата -->
            <div class="card md:col-span-2 flex flex-col h-[600px]">
                <div id="chatHeader" class="border-b pb-4 mb-4">
                    <h3 class="text-xl font-bold text-primary">Выберите чат</h3>
                </div>

                <!-- Сообщения -->
                <div id="chatMessages" class="flex-1 overflow-y-auto mb-4 space-y-3">
                    <div class="text-center text-gray-500 py-16">
                        <div class="text-6xl mb-4">💬</div>
                        <p>Выберите чат для начала общения</p>
                    </div>
                </div>

                <!-- Форма отправки сообщения -->
                <div id="chatInputArea" class="border-t pt-4 hidden">
                    <div class="flex space-x-2">
                        <input type="text" id="messageInput" placeholder="Введите сообщение..." class="flex-1">
                        <button id="sendMessageBtn" class="btn-primary px-6">Отправить</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white mt-16 py-8 border-t">
        <div class="container mx-auto px-4 text-center text-gray-600 text-sm">
            © 2025 SwiftHire. Учебный проект.
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script src="/js/chat.js"></script>
    <script src="/js/mobile-menu.js"></script>
</body>
</html>
